    <div class="container text-center">
        <div class="row mb-3">
            <div class="col-8 mt-4">
                <h2 class="text-start">Student Details</h2>
            </div>
            <div class="col-4 mt-4">
                <button class="btn btn-primary" type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#staticBackdrop" aria-controls="staticBackdrop">
                    Edit
                </button>

                <div class="offcanvas offcanvas-end" data-bs-backdrop="static" tabindex="-1" id="staticBackdrop"
                    aria-labelledby="staticBackdropLabel">
                    <div class="offcanvas-header">
                        <h5 class="offcanvas-title" id="staticBackdropLabel">Edit Student</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body">
                        <div class="mb-3 text-start">
                            <label for="exampleFormControlInput1" class="form-label">Name</label>
                            <input type="email" class="form-control" id="exampleFormControlInput1"
                                placeholder="Enter Your Name">
                        </div>
                        <div class="mb-3 text-start">
                            <label for="exampleFormControlInput1" class="form-label">Batch #</label>
                            <input type="email" class="form-control" id="exampleFormControlInput1"
                                placeholder="Enter Your Batch">
                        </div>
                        <div class="mb-3 text-start">
                            <label for="formFile" class="form-label">Profile Pic</label>
                            <input class="form-control" type="file" id="formFile">
                        </div>
                        <div class="mb-3 text-start">
                            <label for="exampleFormControlInput1" class="form-label">Email address</label>
                            <input type="email" class="form-control" id="exampleFormControlInput1"
                                placeholder="Enter Your Email">
                        </div>
                        <div class="col-auto text-start">
                            <button type="submit" class="btn btn-primary mb-3">Save</button>
                        </div>
                    </div>
                </div>
                <button class="btn btn-primary" type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#staticBackdrop-2" aria-controls="staticBackdrop">
                    Filter
                </button>

                <div class="offcanvas offcanvas-start" data-bs-backdrop="static" tabindex="-1" id="staticBackdrop-2"
                    aria-labelledby="staticBackdropLabel">
                    <div class="offcanvas-header">
                        <h5 class="offcanvas-title" id="staticBackdropLabel">Filter Student</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body">
                        <div class="mb-3 text-start">
                            <label for="exampleFormControlSelect" class="form-label">Batch #</label>
                            <select class="form-select" aria-label="Default select example">
                                <option selected>Select Batch No</option>
                                <option value="1">Batch 1</option>
                                <option value="2">Batch 2</option>
                                <option value="3">Batch 3</option>
                                <option value="4">Batch 4</option>
                                <option value="5">Batch 5</option>
                                <option value="6">Batch 6</option>
                                <option value="7">Batch 7</option>
                                <option value="8">Batch 8</option>
                                <option value="9">Batch 9</option>
                                <option value="10">Batch 10</option>
                                <option value="11">Batch 11</option>
                                <option value="12">Batch 12</option>
                                <option value="13">Batch 13</option>
                                <option value="14">Batch 14</option>
                                <option value="15">Batch 15</option>
                                <option value="16">Batch 16</option>
                                <option value="17">Batch 17</option>
                                <option value="18">Batch 18</option>
                                <option value="19">Batch 19</option>
                                <option value="20">Batch 20</option>
                                <option value="21">Batch 21</option>
                                <option value="22">Batch 22</option>
                                <option value="23">Batch 23</option>
                                <option value="24">Batch 24</option>
                                <option value="25">Batch 25</option>
                            </select>
                        </div>
                        <div class="mb-3 text-start">
                            <label for="option" class="col-12 form-label">Gender</label>
                            <input type="radio" class="btn-check" name="options-base" id="option5" autocomplete="off">
                            <label class="btn btn-outline-primary me-3" for="option5">Male</label>

                            <input type="radio" class="btn-check" name="options-base" id="option6" autocomplete="off">
                            <label class="btn btn-outline-primary" for="option6">Female</label>

                        </div>
                        <div class="mb-3 text-start">
                            <label for="range4" class="form-label">Age</label>
                            <input type="range" class="form-range" min="16" max="50" value="16" id="range4">
                            <output for="range4" id="rangeValue" aria-hidden="true"></output>

                            <script>
                                // This is an example script, please modify as needed
                                const rangeInput = document.getElementById('range4');
                                const rangeOutput = document.getElementById('rangeValue');

                                // Set initial value
                                rangeOutput.textContent = rangeInput.value;

                                rangeInput.addEventListener('input', function () {
                                    rangeOutput.textContent = this.value;
                                });
                            </script>
                        </div>
                        <div class="mb-3 text-start">
                            <label for="option" class="col-12 form-label">Fee</label>
                            <input type="radio" class="btn-check" name="options-base" id="option7" autocomplete="off">
<label class="btn btn-outline-success me-3" for="option7">Paid</label>

<input type="radio" class="btn-check" name="options-base" id="option8" autocomplete="off">
<label class="btn btn-outline-danger" for="option8">Unpaid</label>

                        </div>
                        <div class="col-auto text-start">
                            <button type="button" class="btn btn-primary mb-3 ps-3 pe-3 rounded-3" data-bs-dismiss="offcanvas" aria-label="Close">Apply</button>
                        </div>
                    </div>
                </div>
            </div>




        </div>

                    </div>
                </nav>
                <div class="tab-content" id="nav-tabContent">

                                </tr>
                            </tbody>

                    <div class="tab-pane fade" id="nav-contact" role="tabpanel" aria-labelledby="nav-contact-tab"
