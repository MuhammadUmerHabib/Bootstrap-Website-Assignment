<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="./assests/logo.png" alt="Bootstrap" width="90">
            </a>
        </div>
    </nav>
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-12 mt-3">
                <img src="./assests/logo.png" class="rounded mx-auto d-block" width="150" alt="...">
            </div>
            <div class="col-12 mt-1">
                <h5>Student Portal</h5>
            </div>
            <div class="col-5">
                <nav>
                    <div class="nav nav-tabs mb-3 bg-body-secondary p-1 border rounded-3" id="nav-tab" role="tablist">
                        <button class="nav-link active col-6 text-secondary rounded-2" id="nav-home-tab"
                            data-bs-toggle="tab" data-bs-target="#nav-home" type="button" role="tab"
                            aria-controls="nav-home" aria-selected="true">Login</button>
                        <button class="nav-link col-6 text-secondary rounded-2" id="nav-profile-tab"
                            data-bs-toggle="tab" data-bs-target="#nav-profile" type="button" role="tab"
                            aria-controls="nav-profile" aria-selected="false">Create Password</button>

                    </div>
                </nav>
                <div class="tab-content p-3 justify-content-center border border-1 rounded-2 border-secondary-subtle"
                    id="nav-tabContent">
                    <div class="tab-pane fade show active justify-content-center" id="nav-home" role="tabpanel"
                        aria-labelledby="nav-home-tab" tabindex="0">
                        <div class="text-start">
                            <h5 class="card-title ">Login</h5>
                            <p  class="mt-1">Kindly provide the CNIC number and password used during SMIT
                                course registration.</p>
                            <div class="mb-3">
                                <label for="exampleFormControlInput1" class="form-label">Email address</label>
                                <input type="email" class="form-control" id="exampleFormControlInput1"
                                    placeholder="name@example.com">

                            </div>
                            <div class="mb-3">
                                <label for="inputPassword5" class="form-label">Password</label>
                                <input type="password" id="inputPassword5" class="form-control"
                                    aria-describedby="passwordHelpBlock">
                            </div>
                            <div class="col-auto">
                                    <a href="./dashboard.html" class="col-12 btn bg-primary-subtle">LOGIN</a>
                            </div>
                        </div>
                    </div>
                    <div class="tab-pane fade" id="nav-profile" role="tabpanel" aria-labelledby="nav-profile-tab"
                        tabindex="0">...</div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
